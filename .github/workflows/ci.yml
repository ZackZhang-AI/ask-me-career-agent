name: CI

on:
  pull_request:
  push:
    branches: [master, main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Scan tracked files for API key patterns
        shell: bash
        run: |
          set -euo pipefail
          prefix='sk'
          suffix='-[A-Za-z0-9_-]{20,}'
          pattern="(^|[^A-Za-z0-9])${prefix}${suffix}"
          matches="$(git grep -nE "$pattern" -- . ':(exclude)tests/**' || true)"
          if [[ -n "$matches" ]]; then
            echo "Potential API key found in tracked production files:"
            echo "$matches"
            exit 1
          fi
          echo "No API key pattern found."

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          CHAT_DISABLED: "true"

      - name: Scan browser bundle for API key patterns
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const root = '.next/static';
          const pattern = new RegExp('\\b' + 'sk-' + '[A-Za-z0-9_-]{20,}\\b');
          const files = [];
          const walk = (dir) => {
            if (!fs.existsSync(dir)) return;
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const target = path.join(dir, entry.name);
              if (entry.isDirectory()) walk(target);
              else files.push(target);
            }
          };
          walk(root);
          const leaked = files.filter((file) => pattern.test(fs.readFileSync(file, 'utf8')));
          if (leaked.length) {
            console.error('Potential API key found in browser bundle:', leaked);
            process.exit(1);
          }
          console.log(`Scanned ${files.length} browser bundle files.`);
          NODE

      - name: Check public source links
        shell: bash
        run: |
          npx tsx - <<'NODE'
          import { sources } from './lib/knowledge.ts';
          const urls = [...new Set(sources.filter((source) => source.public && source.url).map((source) => source.url))];
          const failures = [];
          for (const url of urls) {
            try {
              const response = await fetch(url, {
                headers: { 'User-Agent': 'Ask-Me-CI-Link-Checker' },
                redirect: 'follow',
                signal: AbortSignal.timeout(15000),
              });
              if (!response.ok) failures.push(`${response.status} ${url}`);
            } catch (error) {
              failures.push(`${error.name} ${url}`);
            }
          }
          if (failures.length) {
            console.error('Unavailable public sources:\n' + failures.join('\n'));
            process.exit(1);
          }
          console.log(`Checked ${urls.length} public source links.`);
          NODE
