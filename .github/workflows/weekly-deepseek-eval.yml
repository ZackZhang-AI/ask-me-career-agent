name: Weekly DeepSeek Interview Evaluation

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 1"

permissions:
  contents: read

jobs:
  synthetic-role-review:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_MODEL: deepseek-v4-flash
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run non-blocking synthetic role review
        continue-on-error: true
        shell: bash
        run: |
          if [[ -z "$DEEPSEEK_API_KEY" ]]; then
            echo "DEEPSEEK_API_KEY is not configured; skipping the weekly model review."
            exit 0
          fi
          npm run eval:interview -- --mode deepseek --output output/weekly-deepseek-eval.json
      - name: Upload evaluation report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: weekly-deepseek-eval
          path: output/weekly-deepseek-eval.json
          if-no-files-found: ignore
          retention-days: 30
